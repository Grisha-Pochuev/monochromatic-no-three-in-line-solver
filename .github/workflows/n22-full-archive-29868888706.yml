name: definitive full archive n22 run 29868888706

on:
  push:
    paths:
      - '22x22/RUN_N22_FULL_ARCHIVE_29868888706'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: definitive-full-archive-n22-29868888706
  cancel-in-progress: true

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record this archive run
        id: record
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          cat > 22x22/CURRENT_N22_FULL_ARCHIVE_RUN.md <<EOF
          # Current full archive of n22 run 29868888706

          Run id: ${GITHUB_RUN_ID}
          Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          Source exact run: 29868888706
          Purpose: independently rebuild, verify, and archive all twenty replicas and job logs.
          EOF
          git add 22x22/CURRENT_N22_FULL_ARCHIVE_RUN.md
          git commit -m "record full archive run ${GITHUB_RUN_ID} for n22"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "archive_run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Install pinned OR-Tools
        run: python -m pip install ortools==9.15.6755

      - name: Download aggregate, twenty replica artifacts, prior aggregate, and job logs
        run: |
          set -euo pipefail
          rm -rf downloaded gathered prior job-logs rebuilt
          mkdir -p downloaded gathered prior job-logs rebuilt
          gh run download 29868888706 --repo "$GITHUB_REPOSITORY" --name n22-final-two-overall --dir downloaded
          gh run download 29868888706 --repo "$GITHUB_REPOSITORY" --pattern 'n22-final-two-shard-*' --dir gathered
          gh run download 29842033980 --repo "$GITHUB_REPOSITORY" --name n22-profile-dynamic-overall --dir prior
          test -f downloaded/overall.json
          test -f downloaded/SUMMARY.md
          test -f prior/overall.json
          test "$(find gathered -maxdepth 1 -type d -name 'n22-final-two-shard-*' | wc -l)" -eq 20
          gh api --paginate repos/${GITHUB_REPOSITORY}/actions/runs/29868888706/jobs > jobs.json
          python - <<'PY' > job-list.tsv
          import json,re
          for job in json.load(open('jobs.json',encoding='utf-8')).get('jobs',[]):
              name=re.sub(r'[^A-Za-z0-9_.-]+','-',job['name']).strip('-')
              print(f"{job['id']}\t{name}")
          PY
          while IFS=$'\t' read -r job_id job_name; do
            test -n "$job_id" || continue
            gh api repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs > "job-logs/${job_id}-${job_name}.log" || true
          done < job-list.tsv
          test "$(find job-logs -type f | wc -l)" -ge 22

      - name: Independently rebuild and validate the mathematical result
        run: |
          set -euo pipefail
          python 22x22/verify_22x22.py
          python 22x22/collect_n22_final_two.py \
            --schedule 22x22/final_two_schedule.json \
            --prior-overall prior/overall.json \
            --input-dir gathered \
            --overall rebuilt/overall.json \
            --summary rebuilt/SUMMARY.md \
            --run-id 29868888706 \
            --run-url https://github.com/Grisha-Pochuev/monochromatic-no-three-in-line-solver/actions/runs/29868888706 \
            --run-sha f2407396a660c5e4a7f11d4052b38eb604f4d013
          cmp downloaded/overall.json rebuilt/overall.json
          cmp downloaded/SUMMARY.md rebuilt/SUMMARY.md
          python - <<'PY'
          import json
          from pathlib import Path
          o=json.load(open('rebuilt/overall.json',encoding='utf-8'))
          assert o['conclusion']=='FOLLOWUP_RUN_INCOMPLETE'
          assert o['expected_replica_records']==o['records_found']==20
          assert o['complete_replica_set'] is True
          assert o['replica_status_counts']=={'652':{'UNKNOWN':10},'1132':{'INFEASIBLE':5,'UNKNOWN':5}}
          assert o['selected_final_statuses']=={'652':'UNKNOWN','1132':'INFEASIBLE'}
          assert o['remaining_child_ids']==[652]
          assert o['remaining_pair_indices']==[40]
          assert o['cumulative_all_children_infeasible']==2639
          assert o['missing_replica_assignments']==[]
          assert o['duplicate_replica_assignments']==[]
          assert o['unexpected_replica_assignments']==[]
          assert o['contradictory_child_ids']==[]
          assert o['technical_record_count']==0
          assert o['memory_guard_record_count']==0
          assert len(list(Path('gathered').rglob('machine-*.log')))==20
          assert len(list(Path('gathered').rglob('memory-*.log')))==20
          PY

      - name: Save the complete reproducible archive and update documentation
        run: |
          set -euo pipefail
          python - <<'PY'
          import json,re,shutil
          from pathlib import Path

          run_id=29868888706
          run_url=f'https://github.com/Grisha-Pochuev/monochromatic-no-three-in-line-solver/actions/runs/{run_id}'
          archive=Path(f'22x22/runs/2026-07-22-run-{run_id}')
          if archive.exists():
              shutil.rmtree(archive)
          archive.mkdir(parents=True)
          shutil.copy2('rebuilt/overall.json',archive/'overall.json')
          shutil.copy2('rebuilt/SUMMARY.md',archive/'SUMMARY.md')
          shutil.copytree('gathered',archive/'shards')
          shutil.copytree('job-logs',archive/'job-logs')
          shutil.copy2('jobs.json',archive/'jobs.json')
          shutil.copy2('job-list.tsv',archive/'job-list.tsv')

          o=json.load(open('rebuilt/overall.json',encoding='utf-8'))
          (archive/'README.md').write_text(f'''# GitHub Actions run {run_id}

Source: {run_url}

Overall artifact: `n22-final-two-overall`, id `8516897994`, SHA-256 `8160e67070ea1428c90a20876313adfd52da843ceff78d466e05a8243fbd6ef0`.

The uploaded aggregate was independently regenerated from all twenty replica artifacts and matched byte-for-byte.

- replica records: 20 / 20
- child `652`: 10 `UNKNOWN`
- child `1132`: 5 `INFEASIBLE`, 5 `UNKNOWN`; one exact `INFEASIBLE` is sufficient to close the child
- selected final statuses: child `652` = `UNKNOWN`, child `1132` = `INFEASIBLE`
- missing / duplicate / unexpected / contradictory assignments: 0
- `MODEL_INVALID` / technical / memory-guard records: 0
- cumulative exact exclusions: 2639 / 2640
- remaining exact child: `652`, main-diagonal pair `40`
- solver work: {o['current_solver_job_hours']:.2f} job-hours

Files:

- `overall.json` and `SUMMARY.md` — independently regenerated aggregate and summary;
- `shards/` — all twenty records, machine reports, and minute-by-minute memory logs;
- `job-logs/` — all downloadable GitHub Actions job logs;
- `jobs.json` and `job-list.tsv` — job inventory used for the archive.

Independent lower-bound check:

```bash
python 22x22/verify_22x22.py
```

`UNKNOWN` is not a proof. The certified status remains `33 <= D_mono(22) <= 34`.
''',encoding='utf-8')

          Path('22x22/current_prior_overall.json').write_text(json.dumps(o,indent=2)+'\n',encoding='utf-8')
          Path('22x22/FINAL_FRONTIER_29868888706.md').write_text('''# Verified frontier after run 29868888706

- child `1132`: strictly `INFEASIBLE`;
- child `652`: `UNKNOWN` in all ten full-budget replicas;
- exact exclusions: 2639 / 2640;
- sole remaining child: `652`, main-diagonal pair `40`;
- certified status: `33 <= D_mono(22) <= 34`.
''',encoding='utf-8')

          start_path=Path('START_HERE.md')
          start=start_path.read_text(encoding='utf-8')
          lines=start.splitlines()
          for i,line in enumerate(lines):
              if line.startswith('Последнее существенное обновление:'):
                  lines[i]='Последнее существенное обновление: **22 июля 2026 года**, после разбора прогона `29868888706`.'
                  break
          start='\n'.join(lines)+'\n'
          block=f'''### 29868888706 — двадцать полноразмерных попыток по двум последним случаям

Ссылка: {run_url}

Архив: `{archive.as_posix()}/`

```text
child 652:  UNKNOWN в 10 из 10 попыток
child 1132: INFEASIBLE в 5 попытках, UNKNOWN в 5
пропуски/дубли/противоречия/MODEL_INVALID/технические ошибки: 0
```

Случай `1132` строго закрыт. Из 2640 точных дочерних случаев исключены 2639; единственный остаток — `652`. Доска пока не закрыта.
'''
          marker='\n---\n\n## 6. Рациональный сертификат'
          if '### 29868888706 — двадцать полноразмерных попыток' not in start:
              start=start.replace(marker,'\n'+block+marker,1)
          start_path.write_text(start,encoding='utf-8')

          root_path=Path('README.md')
          root=root_path.read_text(encoding='utf-8')
          root=root.replace('actions/runs/29815441947','actions/runs/29868888706')
          root=re.sub(r'For the `22×22` case,.*?(?=\n\n## A small example)',
                      'For the `22×22` case, the repository records a verified 33-point construction and an exact all-lines exclusion search for a possible 34th point. Run `29868888706` used twenty independent full-budget replicas on the final two exact children. Child `1132` is strictly excluded; child `652` remains unresolved after ten attempts. In total 2639 of all 2640 children are closed, so the certified status remains `33 ≤ D_mono(22) ≤ 34`. The sole remaining child is now partitioned exhaustively by exact row and column saturation counts.',
                      root,flags=re.S)
          root_path.write_text(root,encoding='utf-8')

          n22_path=Path('22x22/README.md')
          n22=n22_path.read_text(encoding='utf-8')
          run_block=f'''### Run 29868888706

Archive: `{archive.as_posix()}/`

- child `652`: `UNKNOWN` in all 10 replicas;
- child `1132`: `INFEASIBLE` in 5 replicas and `UNKNOWN` in 5, hence strictly excluded;
- complete replica set: 20 / 20;
- missing/duplicate/unexpected/contradictory/model-invalid/technical: 0;
- cumulative exact exclusions: 2639 / 2640;
- solver work: {o['current_solver_job_hours']:.2f} job-hours.

Source run: {run_url}
'''
          if '### Run 29868888706' not in n22:
              n22=n22.replace('\n## Current follow-up attack','\n'+run_block+'\n## Current follow-up attack',1)
          pos=n22.find('## Current follow-up attack')
          if pos>=0:
              nxt=n22.find('\n## ',pos+5)
              if nxt<0:nxt=len(n22)
              n22=n22[:pos]+'''## Current follow-up attack

Only exact child `652` remains unresolved. It is main-diagonal pair `40` with `diag_plus_twos = 16` and `diag_minus_twos = 16`. Ten full-budget replicas all returned `UNKNOWN`, so the next exact search partitions this child into the 21 disjoint cases `12 <= row_twos <= column_twos <= 17`. The other 2639 children must not be recomputed.
'''+n22[nxt:]
          n22_path.write_text(n22,encoding='utf-8')
          PY

      - name: Commit the verified full archive
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add START_HERE.md README.md 22x22
          git commit -m 'archive all records for n22 run 29868888706 and isolate child 652'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload archive verification record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n22-29868888706-definitive-archive-check
          path: |
            downloaded/
            rebuilt/
            jobs.json
            job-list.tsv
          retention-days: 30
