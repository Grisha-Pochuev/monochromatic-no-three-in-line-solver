name: n18 search

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke = short check, deep = longer search"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - deep
      seconds:
        description: "Seconds for each search job. For deep runs, 21000 is just under 6 hours."
        required: true
        default: "120"
      seed:
        description: "Seed for local search"
        required: true
        default: "18"

jobs:
  verify:
    name: Verify included 27-point construction
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify lower bound configuration
        run: |
          python 18x18/verify_config18.py 18x18/data/lower_bound_27.json

  smoke:
    name: Smoke test scripts
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event.inputs.mode == 'smoke' }}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile DFS
        run: |
          g++ -O3 -std=c++17 18x18/dfs18.cpp -o dfs18

      - name: Run short DFS
        run: |
          mkdir -p results
          ./dfs18 60 0 1 > results/dfs18_smoke.out 2> results/dfs18_smoke.log || true

      - name: Run short local search
        run: |
          python 18x18/local18.py 60 "${{ github.event.inputs.seed }}" > results/local18_smoke.out 2> results/local18_smoke.log || true

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n18-smoke-results
          path: results/

  dfs_deep:
    name: DFS shard ${{ matrix.shard }} of 8
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event.inputs.mode == 'deep' }}
    timeout-minutes: 355
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile DFS
        run: |
          g++ -O3 -std=c++17 18x18/dfs18.cpp -o dfs18

      - name: Run DFS shard
        run: |
          mkdir -p results
          ./dfs18 "${{ github.event.inputs.seconds }}" "${{ matrix.shard }}" 8 > "results/dfs18_shard_${{ matrix.shard }}.out" 2> "results/dfs18_shard_${{ matrix.shard }}.log" || true

      - name: Upload DFS shard logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n18-dfs-shard-${{ matrix.shard }}
          path: results/

  cpsat_deep:
    name: CP-SAT feasibility
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event.inputs.mode == 'deep' }}
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ortools

      - name: Run CP-SAT feasibility search
        run: |
          mkdir -p results
          python 18x18/cpsat18_triples.py "${{ github.event.inputs.seconds }}" > results/cpsat18.out 2> results/cpsat18.log || true

      - name: Upload CP-SAT logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n18-cpsat-results
          path: results/

  minconf_deep:
    name: CP-SAT minimum conflict
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event.inputs.mode == 'deep' }}
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ortools

      - name: Run minimum-conflict search
        run: |
          mkdir -p results
          python 18x18/minconf18.py "${{ github.event.inputs.seconds }}" > results/minconf18.out 2> results/minconf18.log || true

      - name: Upload minconf logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n18-minconf-results
          path: results/

  local_deep:
    name: Local swap search
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event.inputs.mode == 'deep' }}
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run local swap search
        run: |
          mkdir -p results
          python 18x18/local18.py "${{ github.event.inputs.seconds }}" "${{ github.event.inputs.seed }}" > results/local18.out 2> results/local18.log || true

      - name: Upload local-search logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n18-local-results
          path: results/
