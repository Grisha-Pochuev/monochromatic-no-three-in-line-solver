name: archive n22 dynamic run v2

on:
  push:
    paths:
      - '22x22/ARCHIVE_N22_DYNAMIC_RUN_V2'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: archive-n22-dynamic-run-v2
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download source records
        shell: bash
        run: |
          set -euo pipefail
          run_id=29815441947
          rm -rf downloaded job-logs regenerated
          mkdir -p downloaded job-logs regenerated
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --pattern 'n22-profile-dynamic-*' --dir downloaded
          gh api --paginate "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100" --jq '.jobs[].id' > job-ids.txt
          while read -r job_id; do
            test -n "$job_id" || continue
            curl --fail --silent --show-error --location \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/jobs/$job_id/logs" \
              -o "job-logs/$job_id.log"
          done < job-ids.txt
          test "$(find downloaded -maxdepth 1 -type d -name 'n22-profile-dynamic-shard-*' | wc -l)" -eq 20
          test -f downloaded/n22-profile-dynamic-overall/overall.json
          test -f downloaded/n22-profile-dynamic-overall/SUMMARY.md

      - name: Independently collect and validate
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install ortools==9.15.6755
          python 22x22/collect_n22_profile_followup.py \
            --schedule 22x22/current_remaining_schedule.json \
            --prior-overall 22x22/current_prior_overall.json \
            --input-dir downloaded \
            --overall regenerated/overall.json \
            --summary regenerated/SUMMARY.md \
            --run-id 29815441947 \
            --run-url 'https://github.com/Grisha-Pochuev/monochromatic-no-three-in-line-solver/actions/runs/29815441947' \
            --run-sha '0fa82b4e804d862e087a6058f2b933a614415bf3'
          cmp downloaded/n22-profile-dynamic-overall/overall.json regenerated/overall.json
          python - <<'PY'
          import json
          from pathlib import Path
          overall = json.loads(Path('regenerated/overall.json').read_text())
          assert overall['expected_followup_children'] == 56
          assert overall['records_found'] == 56
          assert overall['missing_child_ids'] == []
          assert overall['duplicate_child_ids'] == []
          assert overall['unexpected_child_ids'] == []
          assert overall['current_status_counts'] == {
              'INFEASIBLE': 46, 'UNKNOWN': 10, 'FEASIBLE': 0,
              'OPTIMAL': 0, 'MODEL_INVALID': 0,
          }
          assert overall['technical_record_count'] == 0
          assert overall['cumulative_all_children_infeasible'] == 2630
          assert len(overall['remaining_child_ids']) == 10
          assert len(overall['remaining_pair_indices']) == 10
          assert len(list(Path('downloaded').rglob('machine-*.log'))) == 20
          assert len(list(Path('downloaded').rglob('memory-*.log'))) == 20
          assert len(list(Path('job-logs').glob('*.log'))) == 22
          PY

      - name: Archive and prepare the final ten cases
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, shutil
          from pathlib import Path

          run_id = 29815441947
          run_url = f'https://github.com/Grisha-Pochuev/monochromatic-no-three-in-line-solver/actions/runs/{run_id}'
          archive = Path(f'22x22/runs/2026-07-21-run-{run_id}')
          if archive.exists(): shutil.rmtree(archive)
          archive.mkdir(parents=True)
          shutil.copy2('regenerated/overall.json', archive/'overall.json')
          shutil.copy2('regenerated/SUMMARY.md', archive/'SUMMARY.md')
          shutil.copytree('downloaded', archive/'artifacts')
          shutil.copytree('job-logs', archive/'job-logs')

          overall = json.loads(Path('regenerated/overall.json').read_text())
          remaining = [int(x) for x in overall['remaining_child_ids']]
          records = {int(r['child_id']): r for r in overall['records']}
          (archive/'README.md').write_text(f'''# GitHub Actions run {run_id}

Source: {run_url}

Overall artifact: `n22-profile-dynamic-overall`, id `8498787371`, SHA-256 `ba5d3c22821d096167f23b0d365c7a3ecabe612f9d2090a9a15527e91c6963bf`.

This run processed exactly the 56 exact profile children left by run `29795643015`.

- `INFEASIBLE`: 46
- `UNKNOWN`: 10
- `FEASIBLE`/`OPTIMAL`: 0
- missing/duplicate/unexpected/model-invalid: 0
- technical records: 0
- memory-guard records: {overall['memory_guard_record_count']}
- newly closed main-diagonal pairs: {len(overall['newly_closed_pair_indices'])}
- remaining main-diagonal pairs: {len(overall['remaining_pair_indices'])}
- remaining exact children: 10
- cumulative exact exclusions: 2630 / 2640

Files:

- `overall.json` — independently regenerated complete aggregate;
- `SUMMARY.md` — collector summary;
- `artifacts/` — all shard artifacts, machine reports, and minute-by-minute memory logs;
- `job-logs/` — all GitHub Actions job logs.

Independent lower-bound check:

```bash
python 22x22/verify_22x22.py
```

`UNKNOWN` records are not treated as a proof.
''')

          bins=[{'shard':i,'ids':[],'prior_score_total':0} for i in range(20)]
          ranked=[]
          for cid in remaining:
              r=records[cid]
              ranked.append((int(r.get('branches',0))+2*int(r.get('conflicts',0)),cid))
          for score,cid in sorted(ranked,reverse=True):
              b=min(bins,key=lambda x:(len(x['ids']),x['prior_score_total'],x['shard']))
              b['ids'].append(cid); b['prior_score_total']+=score
          for b in bins: b['count']=len(b['ids'])
          schedule={
              'board_size':22,'target':34,'source_run_id':run_id,'source_run_url':run_url,
              'prior_smoke_infeasible_count':1864,'cumulative_infeasible_count':2630,
              'unknown_child_count':10,'shards':20,'workers_per_solver':4,'fallback_workers':2,
              'total_seconds_per_shard':21000,'memory_guard_mb':13000,
              'max_seconds_per_child':20700,'seed_base':2026072200,
              'balance_score':'latest branches + 2*conflicts; count-first greedy distribution',
              'assignments':bins,
          }
          Path('22x22/current_prior_overall.json').write_text(json.dumps(overall,indent=2)+'\n')
          Path('22x22/current_remaining_schedule.json').write_text(json.dumps(schedule,indent=2)+'\n')

          start=Path('START_HERE.md').read_text()
          start=start.replace('Последнее существенное обновление: **21 июля 2026 года**, после разбора прогона `29795643015`.','Последнее существенное обновление: **21 июля 2026 года**, после разбора прогона `29815441947`.')
          marker='\n---\n\n## 6. Рациональный сертификат'
          block=f'''\n### 29815441947 — повтор по 56 остаткам

Ссылка:

```text
{run_url}
```

Архив:

```text
{archive.as_posix()}/
```

Итог технически полный и независимо пересобран:

```text
INFEASIBLE: 46
UNKNOWN:    10
FEASIBLE/OPTIMAL: 0
missing/duplicate/unexpected/MODEL_INVALID: 0
technical records: 0
```

Суммарно строго исключены 2630 из 2640 дочерних случаев; осталось 10 случаев в 10 парах. Доска пока не закрыта.
'''
          if '### 29815441947 — повтор по 56 остаткам' not in start: start=start.replace(marker,block+marker)
          Path('START_HERE.md').write_text(start)

          root=Path('README.md').read_text()
          root=root.replace('actions/runs/29795643015','actions/runs/29815441947')
          root=root.replace('Run `29795643015` processed the complete 170-child frontier, strictly excluded 114 more children, and left 56 exact children unresolved. In total 2584 of all 2640 children are now closed; therefore the certified status remains `33 ≤ D_mono(22) ≤ 34`.','Run `29815441947` processed the complete 56-child frontier, strictly excluded 46 more children, and left 10 exact children unresolved. In total 2630 of all 2640 children are now closed; therefore the certified status remains `33 ≤ D_mono(22) ≤ 34`.')
          Path('README.md').write_text(root)

          n22=Path('22x22/README.md').read_text()
          run_block=f'''\n### Run 29815441947

Archive: `{archive.as_posix()}/`

The exact follow-up processed all 56 survivors from run `29795643015`:

- `INFEASIBLE`: 46;
- `UNKNOWN`: 10;
- `FEASIBLE`/`OPTIMAL`: 0;
- missing/duplicate/unexpected/model-invalid/technical: 0;
- newly closed main-diagonal pairs: 20;
- remaining main-diagonal pairs: 10;
- cumulative exact exclusions: 2630 / 2640.

Source run: {run_url}
'''
          if '### Run 29815441947' not in n22: n22=n22.replace('\n## Current follow-up attack',run_block+'\n## Current follow-up attack')
          p=n22.find('## Current follow-up attack')
          if p>=0: n22=n22[:p]+'''## Current follow-up attack

The next workflow processes only the 10 exact children still marked `UNKNOWN` after run `29815441947`. It uses 20 jobs (ten active and ten empty), four solver workers, one solver process per machine, a 13 GB RSS guard, and up to 5 hours 50 minutes per job. Previously proved children are not recomputed.
'''
          Path('22x22/README.md').write_text(n22)
          PY

      - name: Commit archive
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add START_HERE.md README.md 22x22
          git commit -m 'archive n22 run 29815441947 and prepare final 10 cases'
          git push origin HEAD:main
