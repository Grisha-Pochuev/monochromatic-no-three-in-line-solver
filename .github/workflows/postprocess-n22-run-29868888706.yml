name: postprocess n22 run 29868888706

on:
  push:
    paths:
      - '22x22/PROCESS_RUN_29868888706'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: postprocess-n22-run-29868888706
  cancel-in-progress: false

jobs:
  archive-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install pinned OR-Tools
        run: python -m pip install ortools==9.15.6755

      - name: Download aggregate and all replica artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf downloaded-overall gathered job-logs regenerated
          mkdir -p downloaded-overall gathered job-logs regenerated
          gh run download 29868888706 --repo "$GITHUB_REPOSITORY" --name n22-final-two-overall --dir downloaded-overall
          gh run download 29868888706 --repo "$GITHUB_REPOSITORY" --pattern 'n22-final-two-shard-*' --dir gathered
          test -f downloaded-overall/overall.json
          test -f downloaded-overall/SUMMARY.md
          test "$(find gathered -maxdepth 1 -type d -name 'n22-final-two-shard-*' | wc -l)" -eq 20

      - name: Download GitHub Actions job logs
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate repos/${GITHUB_REPOSITORY}/actions/runs/29868888706/jobs > jobs.json
          python - <<'PY' > job-list.tsv
          import json, re
          data=json.load(open('jobs.json',encoding='utf-8'))
          for job in data.get('jobs',[]):
              name=re.sub(r'[^A-Za-z0-9_.-]+','-',job['name']).strip('-')
              print(f"{job['id']}\t{name}")
          PY
          while IFS=$'\t' read -r job_id job_name; do
            test -n "$job_id" || continue
            gh api repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs > "job-logs/${job_id}-${job_name}.log" || true
          done < job-list.tsv
          test "$(find job-logs -type f | wc -l)" -ge 22

      - name: Independently rebuild and validate
        shell: bash
        run: |
          set -euo pipefail
          python 22x22/verify_22x22.py
          python 22x22/collect_n22_final_two.py \
            --schedule 22x22/final_two_schedule.json \
            --prior-overall 22x22/runs/2026-07-21-run-29842033980/overall.json \
            --input-dir gathered \
            --overall regenerated/overall.json \
            --summary regenerated/SUMMARY.md \
            --run-id 29868888706 \
            --run-url https://github.com/Grisha-Pochuev/monochromatic-no-three-in-line-solver/actions/runs/29868888706 \
            --run-sha f2407396a660c5e4a7f11d4052b38eb604f4d013
          cmp downloaded-overall/overall.json regenerated/overall.json
          python - <<'PY'
          import json
          from pathlib import Path
          o=json.load(open('regenerated/overall.json',encoding='utf-8'))
          assert o['conclusion']=='FOLLOWUP_RUN_INCOMPLETE'
          assert o['expected_replica_records']==20
          assert o['records_found']==20
          assert o['complete_replica_set'] is True
          assert o['missing_replica_assignments']==[]
          assert o['duplicate_replica_assignments']==[]
          assert o['unexpected_replica_assignments']==[]
          assert o['contradictory_child_ids']==[]
          assert o['technical_record_count']==0
          assert o['memory_guard_record_count']==0
          assert o['replica_status_counts']=={
              '652': {'UNKNOWN': 10},
              '1132': {'INFEASIBLE': 5, 'UNKNOWN': 5},
          }
          assert o['selected_final_statuses']=={'652':'UNKNOWN','1132':'INFEASIBLE'}
          assert o['remaining_child_ids']==[652]
          assert o['remaining_pair_indices']==[40]
          assert o['cumulative_all_children_infeasible']==2639
          assert len(list(Path('gathered').rglob('machine-*.log')))==20
          assert len(list(Path('gathered').rglob('memory-*.log')))==20
          PY

      - name: Archive and update project memory
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, re, shutil
          from pathlib import Path

          run_id=29868888706
          run_url=f'https://github.com/Grisha-Pochuev/monochromatic-no-three-in-line-solver/actions/runs/{run_id}'
          archive=Path(f'22x22/runs/2026-07-22-run-{run_id}')
          if archive.exists():
              shutil.rmtree(archive)
          archive.mkdir(parents=True)
          shutil.copy2('regenerated/overall.json',archive/'overall.json')
          shutil.copy2('regenerated/SUMMARY.md',archive/'SUMMARY.md')
          shutil.copytree('gathered',archive/'shards')
          shutil.copytree('job-logs',archive/'job-logs')
          if Path('22x22/FINAL_OUTCOME_29868888706.md').exists():
              shutil.copy2('22x22/FINAL_OUTCOME_29868888706.md',archive/'EXTRACTED_OUTCOME.md')

          o=json.load(open('regenerated/overall.json',encoding='utf-8'))
          (archive/'README.md').write_text(f'''# GitHub Actions run {run_id}

Source: {run_url}

Overall artifact: `n22-final-two-overall`, id `8516897994`, SHA-256 `8160e67070ea1428c90a20876313adfd52da843ceff78d466e05a8243fbd6ef0`.

This run made ten independent full-budget attempts for each of the two final exact profile children.

- replica records: 20 / 20
- child `652`: 10 `UNKNOWN`
- child `1132`: 5 `INFEASIBLE`, 5 `UNKNOWN`; therefore the exact child is `INFEASIBLE`
- selected final statuses: child `652` = `UNKNOWN`, child `1132` = `INFEASIBLE`
- missing / duplicate / unexpected / contradictory assignments: 0
- technical records: 0
- memory-guard records: 0
- newly closed main-diagonal pairs: 1
- remaining exact children: 1
- cumulative exact exclusions: 2639 / 2640
- solver work: {o['current_solver_job_hours']:.2f} job-hours

Files:

- `overall.json` — independently regenerated aggregate;
- `SUMMARY.md` — independently regenerated summary;
- `shards/` — all twenty replica records, machine reports, and minute-by-minute memory logs;
- `job-logs/` — GitHub Actions job logs.

Independent lower-bound check:

```bash
python 22x22/verify_22x22.py
```

`UNKNOWN` is not treated as a proof. The only remaining exact frontier is child `652` in main-diagonal pair `40`.
''',encoding='utf-8')

          Path('22x22/current_prior_overall.json').write_text(json.dumps(o,indent=2)+'\n',encoding='utf-8')

          start_path=Path('START_HERE.md')
          start=start_path.read_text(encoding='utf-8')
          start=re.sub(r'Последнее существенное обновление: \*\*.*?\*\*, после разбора прогона `\d+`\.',
                       'Последнее существенное обновление: **22 июля 2026 года**, после разбора прогона `29868888706`.',start,count=1)
          block=f'''### 29868888706 — десять реплик двух последних случаев

Ссылка:

```text
{run_url}
```

Архив:

```text
{archive.as_posix()}/
```

Итог технически полный и независимо пересобран:

```text
child 652:  UNKNOWN во всех 10 репликах
child 1132: INFEASIBLE в 5 репликах, UNKNOWN в 5
missing/duplicate/unexpected/MODEL_INVALID: 0
technical records: 0
```

Один строгий `INFEASIBLE` закрывает весь точный случай независимо от результатов других реплик, поэтому child `1132` окончательно исключён. Суммарно закрыты 2639 из 2640 дочерних случаев. Остался только child `652` в паре `40`; доска пока не закрыта.
'''
          marker='\n---\n\n## 6. Рациональный сертификат'
          if '### 29868888706 — десять реплик двух последних случаев' not in start:
              start=start.replace(marker,'\n'+block+marker,1)
          start=re.sub(r'## 7\..*?(?=\n## 8\.)',
                       '''## 7. Текущий точный остаток: один случай

Остался только child `652` (пара `40`). Десять независимых прогонов по 5 ч 50 мин каждый завершились `UNKNOWN`, поэтому простое повторение случайных начальных значений исчерпало себя. Следующий строгий шаг — исчерпывающе разбить этот случай по точным числам строк и столбцов, содержащих по две выбранные точки: `12 <= row_twos <= column_twos <= 17`. Это 21 непересекающийся подслучай, вместе полностью покрывающий child `652`.

''',start,flags=re.S)
          start_path.write_text(start,encoding='utf-8')

          root_path=Path('README.md')
          root=root_path.read_text(encoding='utf-8')
          root=root.replace('actions/runs/29815441947','actions/runs/29868888706')
          root=re.sub(r'For the `22×22` case,.*?(?=\n\n## A small example)',
                      'For the `22×22` case, the repository records a verified 33-point construction and an exact all-lines exclusion search for a possible 34th point. Run `29868888706` made ten independent full-budget attempts for each of the last two exact profile children. Child `1132` was strictly proved `INFEASIBLE`; child `652` remained `UNKNOWN` in all ten attempts. In total 2639 of all 2640 children are now closed, so the certified status remains `33 ≤ D_mono(22) ≤ 34`. The sole remaining exact case is being split exhaustively by the exact numbers of saturated rows and columns.',
                      root,flags=re.S)
          root_path.write_text(root,encoding='utf-8')

          n22_path=Path('22x22/README.md')
          n22=n22_path.read_text(encoding='utf-8')
          run_block=f'''### Run 29868888706

Archive: `{archive.as_posix()}/`

The replicated exact follow-up processed the final two children from run `29842033980`:

- child `652`: 10 × `UNKNOWN`;
- child `1132`: 5 × `INFEASIBLE`, 5 × `UNKNOWN`, hence the child is strictly `INFEASIBLE`;
- complete replica records: 20 / 20;
- missing/duplicate/unexpected/contradictory/model-invalid/technical: 0;
- newly closed main-diagonal pairs: 1;
- remaining exact children: 1;
- cumulative exact exclusions: 2639 / 2640;
- solver work: {o['current_solver_job_hours']:.2f} job-hours.

Source run: {run_url}
'''
          if '### Run 29868888706' not in n22:
              n22=n22.replace('\n## Current follow-up attack','\n'+run_block+'\n## Current follow-up attack',1)
          heading='## Current follow-up attack'
          pos=n22.find(heading)
          if pos>=0:
              nxt=n22.find('\n## ',pos+len(heading))
              if nxt<0: nxt=len(n22)
              replacement='''## Current follow-up attack

Only child `652`, belonging to main-diagonal pair `40`, remains `UNKNOWN`. All other 2639 exact profile children are strictly `INFEASIBLE`. Ten independent full-budget repetitions did not resolve child `652`, so the next exact attack partitions it by the exact pair `(row_twos, column_twos)` with `12 <= row_twos <= column_twos <= 17`. The 21 subcases are disjoint and exhaustive. The certified board status is still `33 <= D_mono(22) <= 34` until all subcases are excluded or a valid 34-point configuration is found.
'''
              n22=n22[:pos]+replacement+n22[nxt:]
          n22_path.write_text(n22,encoding='utf-8')
          PY

      - name: Commit verified archive
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add START_HERE.md README.md 22x22
          git commit -m 'archive n22 run 29868888706 and isolate final case 652'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload postprocessing record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n22-run-29868888706-postprocessing
          path: |
            downloaded-overall/
            regenerated/
            jobs.json
            job-list.tsv
          retention-days: 30
