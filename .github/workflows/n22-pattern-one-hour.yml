name: n22 one-hour pattern smoke

on:
  push:
    paths:
      - '22x22/RUN_N22_PATTERN_ONE_HOUR'
  workflow_dispatch:

concurrency:
  group: n22-pattern-one-hour
  cancel-in-progress: true

jobs:
  verify-construction:
    name: Verify 33-point construction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python 22x22/verify_22x22.py

  pattern-smoke:
    name: Pattern smoke shard ${{ matrix.shard }} (${{ matrix.cases }})
    needs: verify-construction
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - {shard: '00', cases: '12,12', seconds_each: 3500}
          - {shard: '01', cases: '12,13', seconds_each: 3500}
          - {shard: '02', cases: '12,14', seconds_each: 3500}
          - {shard: '03', cases: '12,15', seconds_each: 3500}
          - {shard: '04', cases: '12,16', seconds_each: 3500}
          - {shard: '05', cases: '13,13', seconds_each: 3500}
          - {shard: '06', cases: '13,14', seconds_each: 3500}
          - {shard: '07', cases: '13,15', seconds_each: 3500}
          - {shard: '08', cases: '13,16', seconds_each: 3500}
          - {shard: '09', cases: '13,17', seconds_each: 3500}
          - {shard: '10', cases: '14,14', seconds_each: 3500}
          - {shard: '11', cases: '14,15', seconds_each: 3500}
          - {shard: '12', cases: '14,16', seconds_each: 3500}
          - {shard: '13', cases: '14,17', seconds_each: 3500}
          - {shard: '14', cases: '15,15', seconds_each: 3500}
          - {shard: '15', cases: '15,16', seconds_each: 3500}
          - {shard: '16', cases: '15,17', seconds_each: 3500}
          - {shard: '17', cases: '16,16', seconds_each: 3500}
          - {shard: '18', cases: '16,17', seconds_each: 3500}
          - {shard: '19', cases: '12,17;17,17', seconds_each: 1750}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned OR-Tools
        run: python -m pip install ortools==9.15.6755
      - name: Run stronger exact model for this shard
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p results
          IFS=';' read -ra CASE_LIST <<< "${{ matrix.cases }}"
          for item in "${CASE_LIST[@]}"; do
            IFS=',' read -r row_twos column_twos <<< "$item"
            seed=$((22070000 + row_twos * 100 + column_twos))
            python 22x22/prove_upper_22x22_pattern_model.py \
              --row-twos "$row_twos" \
              --column-twos "$column_twos" \
              --seconds "${{ matrix.seconds_each }}" \
              --workers 4 \
              --seed "$seed" \
              --output "results/r${row_twos}-c${column_twos}.json"
          done
      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n22-pattern-one-hour-${{ matrix.shard }}
          path: results/
          retention-days: 30

  collect:
    name: Collect one-hour n22 pattern smoke
    needs: pattern-smoke
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: n22-pattern-one-hour-*
          path: gathered
          merge-multiple: true
      - name: Compare with saved long-run baseline
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          expected = [(r, c) for r in range(12, 18) for c in range(r, 18)]
          files = sorted(Path('gathered').glob('r*-c*.json'))
          records = [json.loads(path.read_text(encoding='utf-8')) for path in files]
          current = {(int(r['row_twos']), int(r['column_twos'])): r for r in records}

          baseline_path = Path('22x22/runs/2026-07-17-run-29534667942/partial_results.json')
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline_records = {
              (int(r['row_twos']), int(r['column_twos'])): r
              for r in baseline.get('records', [])
          }

          missing = [list(key) for key in expected if key not in current]
          infeasible = [r for r in records if r.get('status') == 'INFEASIBLE']
          unknown = [r for r in records if r.get('status') == 'UNKNOWN']
          feasible = [r for r in records if r.get('status') in {'FEASIBLE', 'OPTIMAL'}]
          invalid = [r for r in records if r.get('status') == 'MODEL_INVALID']

          if feasible:
              conclusion = 'FOUND_34_POINT_COUNTEREXAMPLE'
          elif len(records) == 21 and len(infeasible) == 21:
              conclusion = 'PROVED_D_MONO_22_EQUALS_33'
          elif missing or invalid:
              conclusion = 'TECHNICAL_FAILURE_IN_ONE_HOUR_RUN'
          else:
              conclusion = 'ONE_HOUR_PATTERN_SMOKE_COMPLETE_BUT_PROOF_OPEN'

          comparisons = []
          for key in expected:
              now = current.get(key)
              old = baseline_records.get(key)
              comparisons.append({
                  'row_twos': key[0],
                  'column_twos': key[1],
                  'baseline_status': old.get('status') if old else 'NOT_COLLECTED',
                  'baseline_branches': int(old.get('branches', 0)) if old else 0,
                  'current_status': now.get('status') if now else 'MISSING',
                  'current_branches': int(now.get('branches', 0)) if now else 0,
                  'current_conflicts': int(now.get('conflicts', 0)) if now else 0,
                  'current_seconds': float(now.get('elapsed_seconds', 0.0)) if now else 0.0,
              })

          overall = {
              'conclusion': conclusion,
              'board_size': 22,
              'target': 34,
              'verified_lower_bound': 33,
              'model': 'four_direction_exact_patterns_plus_all_remaining_lines',
              'baseline_run_id': baseline.get('run_id'),
              'baseline_solver_job_hours': baseline.get('totals', {}).get('elapsed_seconds', 0) / 3600,
              'expected_partitions': 21,
              'records_found': len(records),
              'missing_partitions': missing,
              'infeasible_count': len(infeasible),
              'unknown_count': len(unknown),
              'feasible_count': len(feasible),
              'invalid_count': len(invalid),
              'current_solver_job_hours': sum(float(r.get('elapsed_seconds', 0.0)) for r in records) / 3600,
              'current_total_branches': sum(int(r.get('branches', 0)) for r in records),
              'current_total_conflicts': sum(int(r.get('conflicts', 0)) for r in records),
              'comparisons': comparisons,
              'records': records,
          }
          Path('overall.json').write_text(json.dumps(overall, indent=2) + '\n', encoding='utf-8')

          lines = [
              '# One-hour 22x22 pattern smoke',
              '',
              f'Conclusion: `{conclusion}`',
              '',
              f'- current partition records: {len(records)}/21',
              f'- INFEASIBLE: {len(infeasible)}',
              f'- UNKNOWN: {len(unknown)}',
              f'- FEASIBLE/OPTIMAL at target 34: {len(feasible)}',
              f'- missing: {len(missing)}',
              f'- saved baseline computation: {overall["baseline_solver_job_hours"]:.2f} job-hours',
              f'- current computation: {overall["current_solver_job_hours"]:.2f} job-hours',
              '',
              'The earlier long run is retained as a baseline; CP-SAT cannot resume an UNKNOWN search state,',
              'so this run uses the stronger exact pattern model and independent valid 32-bit seeds.',
              'UNKNOWN is recorded as mathematical incompleteness, not shown as a technical red failure.',
          ]
          Path('SUMMARY.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(json.dumps(overall, indent=2))

          if missing or invalid:
              raise SystemExit(1)
          PY
      - name: Upload one-hour summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n22-pattern-one-hour-overall
          path: |
            overall.json
            SUMMARY.md
          retention-days: 30
