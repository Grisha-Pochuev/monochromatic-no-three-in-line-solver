name: n22 final outcome extractor

on:
  push:
    paths:
      - '22x22/RUN_N22_FINAL_TWO_5H50'

permissions:
  contents: write
  actions: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record extractor run
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          printf '# Current n22 outcome extractor\n\nRun id: %s\nRun URL: %s/%s/actions/runs/%s\nSource run: 29868888706\n' "$GITHUB_RUN_ID" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" > 22x22/CURRENT_N22_OUTCOME_EXTRACTOR.md
          git add 22x22/CURRENT_N22_OUTCOME_EXTRACTOR.md
          git commit -m "record n22 outcome extractor ${GITHUB_RUN_ID}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Download exact overall result
        run: |
          gh run download 29868888706 --repo "$GITHUB_REPOSITORY" --name n22-final-two-overall --dir outcome
          test -f outcome/overall.json

      - name: Commit human-readable outcome
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          o=json.load(open('outcome/overall.json',encoding='utf-8'))
          lines=[
              '# Outcome of run 29868888706','',
              f"Conclusion: `{o['conclusion']}`",'',
              f"- replica records: {o['records_found']} / {o['expected_replica_records']}",
              f"- complete replica set: {o['complete_replica_set']}",
              f"- child 652: `{o['replica_status_counts'].get('652',{})}`",
              f"- child 1132: `{o['replica_status_counts'].get('1132',{})}`",
              f"- selected final statuses: `{o['selected_final_statuses']}`",
              f"- remaining child ids: `{o['remaining_child_ids']}`",
              f"- cumulative exact exclusions: {o['cumulative_all_children_infeasible']} / 2640",
              f"- missing assignments: `{o['missing_replica_assignments']}`",
              f"- duplicate assignments: `{o['duplicate_replica_assignments']}`",
              f"- unexpected assignments: `{o['unexpected_replica_assignments']}`",
              f"- contradictory child ids: `{o['contradictory_child_ids']}`",
              f"- technical records: {o['technical_record_count']}",
              f"- memory-guard records: {o['memory_guard_record_count']}",
              f"- solver work: {o['current_solver_job_hours']:.2f} job-hours",
          ]
          Path('22x22/FINAL_OUTCOME_29868888706.md').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 22x22/FINAL_OUTCOME_29868888706.md
          git commit -m 'record exact outcome of n22 run 29868888706'
          git pull --rebase origin main
          git push origin HEAD:main
