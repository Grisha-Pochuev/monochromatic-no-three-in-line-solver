name: n22 final frontier updater

on:
  push:
    paths:
      - '22x22/RUN_N22_FINAL_TWO_5H50'

permissions:
  contents: write
  actions: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record updater run
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          printf '# Current n22 frontier updater\n\nRun id: %s\nRun URL: %s/%s/actions/runs/%s\nSource run: 29868888706\n' "$GITHUB_RUN_ID" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" > 22x22/CURRENT_N22_FRONTIER_UPDATER.md
          git add 22x22/CURRENT_N22_FRONTIER_UPDATER.md
          git commit -m "record n22 frontier updater ${GITHUB_RUN_ID}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Download and validate final overall result
        run: |
          gh run download 29868888706 --repo "$GITHUB_REPOSITORY" --name n22-final-two-overall --dir result
          python - <<'PY'
          import json
          from pathlib import Path
          o=json.load(open('result/overall.json',encoding='utf-8'))
          assert o['conclusion']=='FOLLOWUP_RUN_INCOMPLETE'
          assert o['records_found']==o['expected_replica_records']==20
          assert o['complete_replica_set'] is True
          assert o['replica_status_counts']=={'652':{'UNKNOWN':10},'1132':{'INFEASIBLE':5,'UNKNOWN':5}}
          assert o['selected_final_statuses']=={'652':'UNKNOWN','1132':'INFEASIBLE'}
          assert o['remaining_child_ids']==[652]
          assert o['remaining_pair_indices']==[40]
          assert o['cumulative_all_children_infeasible']==2639
          assert o['missing_replica_assignments']==[]
          assert o['duplicate_replica_assignments']==[]
          assert o['unexpected_replica_assignments']==[]
          assert o['contradictory_child_ids']==[]
          assert o['technical_record_count']==0
          assert o['memory_guard_record_count']==0
          Path('22x22/current_prior_overall.json').write_text(json.dumps(o,indent=2)+'\n',encoding='utf-8')
          Path('22x22/FINAL_FRONTIER_29868888706.md').write_text('''# Verified frontier after run 29868888706

- child 1132: strictly INFEASIBLE;
- child 652: UNKNOWN in all ten full-budget replicas;
- cumulative exact exclusions: 2639 / 2640;
- sole remaining child: 652, main-diagonal pair 40;
- certified status: 33 <= D_mono(22) <= 34.
''',encoding='utf-8')
          PY

      - name: Commit verified frontier
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 22x22/current_prior_overall.json 22x22/FINAL_FRONTIER_29868888706.md
          git commit -m 'record verified n22 frontier with sole child 652'
          git pull --rebase origin main
          git push origin HEAD:main
